  <!-- Language detection & redirection -->
  <script>
    (function() {
      // Supported languages and their corresponding subdirectories
      const langMap = {
        'fr': '/fr/',
        'en': '/en/',
        'mos': '/mos/',
        'sw': '/sw/',
        'wo': '/wo/',
        'ha': '/ha/'
      };
      // Default fallback
      const defaultLang = '/fr/';

      // Get browser language (first part, e.g., 'fr', 'en', 'mos'…)
      let browserLang = (navigator.language || navigator.userLanguage || '').split('-')[0].toLowerCase();
      // Check if we support it
      let target = langMap[browserLang];
      if (!target) {
        // Try to match with a partial? e.g., 'wo' already exact; no need.
        target = defaultLang;
      }
      // Avoid redirect loop: only redirect if not already on a language subdirectory
      // (we are at root, pathname === '/')
      if (window.location.pathname === '/' && window.location.search === '' && !window.location.hash) {
        window.location.replace(target);
      }
    })();
  </script>
